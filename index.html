<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Tracker - Google Sheets Sync</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #4caf50;
            --background-color: #f1f8e9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            font-size: 22px;
        }

        .status-box {
            background: #e8f5e9;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .status-box p {
            margin: 5px 0;
        }

        .highlight {
            font-weight: bold;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fff;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: var(--secondary-color);
        }

        .loading-text {
            font-style: italic;
            color: #888;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tracker Tilawah Al-Quran</h2>
    
    <!-- Kotak Status Bacaan Terakhir -->
    <div class="status-box">
        <p><strong>📖 Bacaan Terakhir:</strong></p>
        <p>Surah: <span id="lastSurah" class="highlight">Memuat data...</span></p>
        <p>Ayat Terakhir: <span id="lastAyat" class="highlight">Memuat data...</span></p>
        <p>Juz: <span id="lastJuz" class="highlight">Memuat data...</span></p>
        <small style="color: #666;">Diperbarui: <span id="lastUpdated">-</span></small>
    </div>

    <!-- Form Update Bacaan -->
    <div class="form-group">
        <label for="surahInput">Pilih Surah</label>
        <select id="surahInput">
            <option value="">-- Pilih Surah --</option>
            <!-- Daftar 114 Surah diisi via Javascript -->
        </select>
    </div>

    <div class="form-group">
        <label for="ayatInput">Ayat Terakhir Selesai Dibaca</label>
        <input type="number" id="ayatInput" placeholder="Contoh: 141" min="1">
    </div>

    <div class="form-group">
        <label for="juzInput">Juz (Opsional)</label>
        <input type="number" id="juzInput" placeholder="Contoh: 1" min="1" max="30">
    </div>

    <button id="btnSimpan" onclick="simpanProgres()">Simpan Progres</button>

    <div class="footer">
        Sinkronisasi otomatis dengan Google Sheets ☁️
    </div>
</div>

<!-- Import Logic JavaScript -->
<script src="app.js"></script>
</body>
</html>
